name: Deploy Zelaxy

on:
  push:
    branches: [main]
    paths:
      - 'apps/zelaxy/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'

jobs:
  deploy:
    name: Deploy Zelaxy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Pull Vercel Environment
        run: bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ZELAXY_PROJECT_ID }}
      - name: Build
        run: bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ZELAXY_PROJECT_ID }}
      - name: Deploy
        run: bunx vercel deploy --prebuilt --prod --force --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ZELAXY_PROJECT_ID }}
